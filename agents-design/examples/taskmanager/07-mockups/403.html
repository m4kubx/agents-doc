<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 Acceso Denegado — Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
  .mockup-meta { position: fixed; top: 0; right: 0; background: #0f172a; color: #e2e8f0; padding: 6px 14px; font-size: 12px; border-radius: 0 0 0 8px; z-index: 999; }
  .card { background: #fff; border-radius: 12px; padding: 48px 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .code { font-size: 72px; font-weight: 800; color: #fef3c7; line-height: 1; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
  .actions { display: flex; gap: 8px; justify-content: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: default; text-decoration: none; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-secondary { background: #e2e8f0; color: #475569; }
</style>
</head>
<body>

<div class="mockup-meta">Mockup <strong>403 Acceso Denegado</strong> | Layout: <strong>minimal</strong></div>

<div class="card">
  <div class="icon">🚫</div>
  <div class="code">403</div>
  <h1>Acceso Denegado</h1>
  <p>No tienes permisos suficientes para acceder a esta sección.<br>Si crees que esto es un error, contacta a tu administrador.</p>
  <div class="actions">
    <a href="#" class="btn btn-primary">🏠 Volver al Dashboard</a>
    <a href="#" class="btn btn-secondary">🔐 Solicitar Acceso</a>
  </div>
</div>

</body>
</html>
