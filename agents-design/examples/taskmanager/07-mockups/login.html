<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .mockup-meta { position: fixed; top: 0; right: 0; background: #0f172a; color: #e2e8f0; padding: 6px 14px; font-size: 12px; border-radius: 0 0 0 8px; z-index: 999; }
  .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; color: #2563eb; }
  .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: #374151; }
  .form-control { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
  .form-control:focus { outline: 2px solid #2563eb; outline-offset: -1px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 20px; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 15px; font-weight: 600; border: none; cursor: default; background: #2563eb; color: #fff; }
  .btn-loading { opacity: 0.7; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .links { text-align: center; margin-top: 16px; font-size: 14px; }
  .links a { color: #2563eb; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .alert-error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; gap: 8px; align-items: flex-start; }
  .state-section { margin-top: 24px; padding-top: 16px; border-top: 1px dashed #e2e8f0; }
  .state-section summary { font-size: 12px; color: #94a3b8; cursor: pointer; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="mockup-meta">Mockup <strong>Login</strong> | Rol: <strong>público</strong> | Layout: <strong>minimal</strong></div>

<div class="card">
  <div class="logo">TaskManager</div>
  <p class="subtitle">Inicia sesión para continuar</p>

  <!-- Estado: Error -->
  <details class="state-section">
    <summary>Toggle: Error State</summary>
    <div class="alert-error">⚠️ Credenciales inválidas. Verifica tu email y contraseña.</div>
  </details>

  <div class="form-group">
    <label>Email</label>
    <input class="form-control" type="email" placeholder="tu@email.com" value="admin@taskmanager.com">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input class="form-control" type="password" placeholder="••••••••">
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="remember" checked>
    <label for="remember">Recordarme</label>
  </div>

  <!-- Estado normal -->
  <button class="btn">Iniciar Sesión</button>

  <!-- Estado loading (comentado para toggle manual) 
  <button class="btn btn-loading">
    <span class="spinner"></span> Iniciando sesión...
  </button>
  -->

  <details class="state-section">
    <summary>Toggle: Loading State</summary>
    <button class="btn btn-loading" disabled>
      <span class="spinner"></span> Iniciando sesión...
    </button>
  </details>

  <div class="links">
    <a href="#">¿Olvidaste tu contraseña?</a> · <a href="#">Registrarse</a>
  </div>
</div>

</body>
</html>
